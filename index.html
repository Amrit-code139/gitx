<body>
    <h2>Enter a passsword</h2>
    <input type="password" id="password" placeholder="Enter a password">
    <br>
     <button onclick="clickhere()"> check strength</button>
     <p id="result"></p>
     <script>
        function clickhere(){
            let password=document.getElementById("password").value;
            let strength=0;
            if(password.length>=8) strength++;
            if(/[A-Z]/.test(password)) strength++;
            if(/[a-z]/.test(password)) strength++;
            if(/[0-9]/.test(password)) strength++;
            if(/[^A-Za-z0-9]/.test(password)) strength++;


            let result=docuemnt.getElementById("result");
            if(strength>=2)
            result.innerText= "weak password";
            else if(strength>=4)
             result.innerText="medium password";
            else            
            result.innerText="strong password";
            

        }
     </script>
